<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Damsolm Analytics</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        .product-view-layout { padding: 6rem 0 4rem; min-height: 80vh; }
        .details-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: start; background: #fff; padding: 2.5rem; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .details-left img { width: 100%; border-radius: 12px; object-fit: cover; box-shadow: 0 8px 25px rgba(0,0,0,0.08); }
        .details-right { display: flex; flex-direction: column; justify-content: center; }
        .details-right h2 { font-size: 2.2rem; margin-bottom: 1rem; color: #1e1e24; line-height: 1.2; }
        .price-panel { font-size: 1.8rem; font-weight: bold; color: #22c55e; margin: 1.5rem 0; }
        .price-panel del { font-size: 1.2rem; color: #ef4444; margin-left: 10px; }
        .prod-description { color: #64748b; line-height: 1.7; font-size: 1rem; margin-bottom: 2rem; }
        
        .checkout-anchor-btn { background: #7b1fa2; color: #fff; border: none; padding: 16px 32px; font-size: 1.1rem; font-weight: 600; border-radius: 8px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 12px; transition: 0.3s ease; text-decoration: none; width: fit-content; }
        .checkout-anchor-btn:hover { background: #4a148c; transform: translateY(-2px); }

        /* NATIVE MODAL OVERLAY INSTEAD OF EXTERNAL REDIRECTS */
        .checkout-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); z-index: 99999; justify-content: center; align-items: center; padding: 10px; }
        .checkout-modal-content { background: #fff; width: 100%; max-width: 550px; height: 90vh; border-radius: 14px; overflow: hidden; position: relative; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .checkout-modal-header { padding: 15px 20px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .checkout-modal-header h4 { margin: 0; font-size: 1.1rem; color: #334155; }
        .close-overlay-btn { background: none; border: none; font-size: 1.6rem; cursor: pointer; color: #94a3b8; transition: color 0.2s; }
        .close-overlay-btn:hover { color: #ef4444; }
        .checkout-frame { width: 100%; flex-grow: 1; border: none; }

        @media (max-width: 768px) { .details-wrapper { grid-template-columns: 1fr; gap: 2rem; padding: 1.5rem; } .product-view-layout { padding: 4rem 0 2rem; } .checkout-anchor-btn { width: 100%; } .checkout-modal-content { height: 95vh; } }
    </style>
</head>
<body>

<nav>
    <div class="container">
        <a href="index.html" class="nav__logo"><h3>Damsolm Analytics</h3></a>
        <ul id="nav__items">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#services">Services</a></li>
            <li><a href="allproduct.html#Products">Products</a></li>
            <li><a href="allproduct.html" class="btn">All Products</a></li>
        </ul>
    </div>
</nav>

<main class="product-view-layout">
    <div class="container">
        <div id="target-product-container" class="details-wrapper">
            <p style="padding:2rem; text-align:center; color:#64748b; width:100%;">Locating selected item record parameters...</p>
        </div>
    </div>
</main>

<!-- ISOLATED LIGHTWEIGHT WIDGET PANEL FOR LOCAL PROCESSING -->
<div id="native-checkout-panel" class="checkout-overlay">
    <div class="checkout-modal-content">
        <div class="checkout-modal-header">
            <h4>Secure Checkout Interface</h4>
            <button class="close-overlay-btn" id="dismiss-checkout">&times;</button>
        </div>
        <iframe id="payment-viewport" class="checkout-frame" src="" allow="payment"></iframe>
    </div>
</div>

<footer>
    <div class="container">
        <article>
            <a href="#" class="footer__logo"><h3>Damsolm Analytics</h3></a>
            <p>Engineering permanent, high-retention automation and strategic reporting workflows.</p>
        </article>
    </div>
    <div class="copyright">
        <small>&copy; Copyright DAMSOLM ANALYTICS, All Rights Reserved</small>
    </div>
</footer>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const globalPricingGrid = {
        NG: [{ current: "₦5,000", old: "₦12,500" }, { current: "₦7,000", old: "₦18,000" }, { current: "₦4,000", old: "₦9,000" }, { current: "₦7,000", old: "₦18,000" }],
        US: [{ current: "$9.99", old: "$24.99" }, { current: "$19.99", old: "$39.99" }, { current: "$7.99", old: "$19.99" }, { current: "$19.99", old: "$39.99" }],
        GB: [{ current: "£7.99", old: "£19.99" }, { current: "£14.99", old: "£34.99" }, { current: "£5.99", old: "£14.99" }, { current: "£14.99", old: "£34.99" }],
        GH: [{ current: "GH₵120", old: "GH₵250" }, { current: "GH₵220", old: "GH₵450" }, { current: "GH₵100", old: "GH₵200" }, { current: "GH₵220", old: "GH₵450" }],
        KE: [{ current: "KSh 1,100", old: "KSh 2,500" }, { current: "KSh 2,200", old: "KSh 4,500" }, { current: "KSh 900", old: "KSh 2,000" }, { current: "KSh 2,200", old: "KSh 4,500" }],
        ZA: [{ current: "R 140", old: "R 300" }, { current: "R 280", old: "R 550" }, { current: "R 110", old: "R 220" }, { current: "R 280", old: "R 550" }]
    };

    const allCatalogProducts = [
        { title: "Beginner to Expert Power BI Course", image: "./assets/Bi Image.png", desc: "Master asset mapping and data shaping pipelines from absolute scratch. Includes fully managed custom dashboards and workflow metrics.", selarSlug: "damsolmanalytics" },
        { title: "Intermediate to Expert Power BI Course", image: "./assets/Expert image.png", desc: "Advanced relational data modeling blueprints, enterprise DAX optimizations, and robust production matrix tracking paradigms.", selarSlug: "expertpowerbi" },
        { title: "VBA Beginner Course", image: "./assets/VBA Beginner Img.png", desc: "Eliminate repetitive tasks. Learn custom syntax configurations, execution statement loops, and deep environment macro recording controls.", selarSlug: "vbabeginnercourse" },
        { title: "VBA Intermediate to Expert Course", image: "./assets/Interm to Expert Img.png", desc: "Object-oriented scripting schemas, multi-app database link controls, and advanced automated application design models.", selarSlug: "vbaexpertcourse" }
    ];

    const container = document.getElementById("target-product-container");
    const modalWrapper = document.getElementById("native-checkout-panel");
    const paymentViewport = document.getElementById("payment-viewport");
    const closeBtn = document.getElementById("dismiss-checkout");

    const urlParams = new URLSearchParams(window.location.search);
    const productId = parseInt(urlParams.get('id')) || 0;
    const selectedProduct = allCatalogProducts[productId];

    if (!selectedProduct) {
        container.innerHTML = `<p style='text-align:center; width:100%; color:red;'>Product record not located. Return to catalog.</p>`;
        return;
    }

    async function setupSingleView() {
        let activePricing = globalPricingGrid["US"];
        
        try {
            const res = await fetch("https://ipapi.co/json/");
            if (res.ok) {
                const data = await res.json();
                if (globalPricingGrid[data.country_code]) activePricing = globalPricingGrid[data.country_code];
            } else {
                throw new Error("429");
            }
        } catch (err) { 
            try {
                const bkRes = await fetch("https://ip2c.org/s");
                const text = await bkRes.text();
                const parts = text.split(";");
                if (parts[0] === "1" && globalPricingGrid[parts[1]]) {
                    activePricing = globalPricingGrid[parts[1]];
                }
            } catch (fallbackErr) {
                console.error("Using default USD pricing.");
            }
        }

        const price = activePricing[productId] || globalPricingGrid["US"][productId];

        container.innerHTML = `
            <div class="details-left">
                <img src="${selectedProduct.image}" alt="${selectedProduct.title}">
            </div>
            <div class="details-right">
                <h2>${selectedProduct.title}</h2>
                <div class="price-panel">
                    <span>${price.current}</span>
                    <del>${price.old}</del>
                </div>
                <p class="prod-description">${selectedProduct.desc}</p>
                <button type="button" class="checkout-anchor-btn" id="trigger-checkout-action">
                    <i class='bx bx-credit-card'></i> Proceed to Pay
                </button>
            </div>
        `;

        // Intercept click and force render inside your own iframe pipeline
        document.getElementById("trigger-checkout-action").addEventListener("click", function(e) {
            e.preventDefault();
            // Appending ?embed=1 strips Selar headers, navbars, and logs—serving ONLY the billing form
            paymentViewport.src = `https://selar.co/${selectedProduct.selarSlug}?embed=1`;
            modalWrapper.style.display = "flex";
            document.body.style.overflow = "hidden"; // Prevent background page from scrolling
        });
    }

    // Modal Control Close Logic
    closeBtn.addEventListener("click", function() {
        modalWrapper.style.display = "none";
        paymentViewport.src = ""; // Clear source to stop iframe background processing
        document.body.style.overflow = "auto";
    });

    // Close if user clicks outside the inner modal content frame boundary
    modalWrapper.addEventListener("click", function(e) {
        if (e.target === modalWrapper) {
            closeBtn.click();
        }
    });

    setupSingleView();
});
</script>
</body>
</html>
